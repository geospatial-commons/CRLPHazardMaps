<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>CRLP AF HA Maps</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href=/css/leaflet.css />

    <!-- App CSS -->
    <link rel="stylesheet" href="/css/styles.css" />

</head>

<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading...</div>
    </div>

    <div id="entire-page">
        <div id="user-instructions">
            <!-- <span id="greeting">Welcome to the CRLP Hazard Mapping Application!</span><br>Use the controls below to
            explore hazard layers across Afghanistan. Select a province to zoom in and view district-level data. You can
            also take a snapshot of the map or download the current view as a PDF report. -->
        </div>
        <div id="control-panel">
            <div id="map-settings">
                <div class="dropdown-row">
                    <div class="dropdown-controls">
                        <label class="cp-label">Province:</label><select id="prov-select">
                            <option value="all">-- Show All --</option>
                        </select>
                    </div>
                    <div class="dropdown-controls">
                        <label class="cp-label">District:</label><select id="dist-select">
                            <option value="all">-- Select a Province --</option>
                        </select>
                    </div>
                    <div class="dropdown-controls">
                        <label class="cp-label">Community:</label><select id="comm-select">
                            <option value="all">-- Select a District --</option>
                        </select>
                    </div>
                </div>
                <div id="raster-list">
                    <p class="cp-label">Select Hazard Layer: </p>

                    <label class="raster-option">
                        <input type="radio" name="hazard-layer" value="none" checked>
                        None
                    </label>

                    <label class="raster-option">
                        <input type="radio" name="hazard-layer" value="flood">
                        Flood
                    </label>

                    <label class="raster-option">
                        <input type="radio" name="hazard-layer" value="avalanche">
                        Avalanche
                    </label>

                    <label class="raster-option">
                        <input type="radio" name="hazard-layer" value="landslide">
                        Landslide
                    </label>
                    <label class="raster-option">
                        <input type="radio" name="hazard-layer" value="earthquake">
                        Earthquake
                    </label>
                    <div id="opacity-slider">
                        <label for="opacity-range" id="opacity-label">Opacity:</label>
                        <input type="range" id="opacity-range" min="0" max="100" step="1" value="50">
                        <span id="opacity-value">50%</span>
                    </div>
                </div>
            </div>
            <div id="action-button">
                <div><button id="download-pdf-btn">Download as PDF</button></div>
            </div>
        </div>
        <div id="main-container">
            <div id="map"></div>
        </div>

        <div id="pdf-content">
            <div id="layout-title" class="row-1"></div>
            <div class="row-2">
                <div id="map-container"></div>
                <div id="right-panel">
                    <div id="right-panel-row-1">
                        <p>Legend</p>

                    </div>
                    <div id="right-panel-row-2">
                        <p id="active-raster"></p>
                        <p id="raster-info"></p>
                    </div>
                </div>
            </div>
            <div id="footer" class="row-3">
                <div id="footer-column-1"></div>
                <div id="footer-column-2"></div>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/georaster"></script>
    <script src="https://unpkg.com/georaster-layer-for-leaflet"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- App JS -->
    <script src="js/map.js"></script>
</body>

</html>
